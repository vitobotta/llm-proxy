services:
  llm-proxy:
    build: .
    ports:
      - "9234:4567"
    volumes:
      # Mount as directory, not single file — avoids inode breakage on atomic writes
      - ./config:/app/config
      # Persist provider state across container restarts
      - ./data:/app/data
    restart: unless-stopped
    environment:
      - RUBY_ENV=production
      - CONFIG_FILE=/app/config/config.yaml
